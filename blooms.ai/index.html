<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooms.ai</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo" id="logo"></div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero">
      <div class="hero-content">
        <h1 id="hero-title"></h1>
        <p id="hero-tagline"></p>
        <a href="#services" class="btn">Explore Services</a>
      </div>
    </section>

    <section id="about">
      <div class="container">
        <h2>About Us</h2>
        <p id="about-description"></p>
      </div>
    </section>

    <section id="services">
      <div class="container">
        <h2>Our Services</h2>
        <div class="services-grid" id="services-grid"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <h2>Get In Touch</h2>
        <div class="contact-details" id="contact-details"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p id="footer-text"></p>
      <div class="social-links" id="social-links"></div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
