<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blooms.ai — Modernizing enterprise systems with responsible AI">
  <title>Blooms.ai</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo" id="logo"></div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="demo/">Demos</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </header>

  <main>
    <section id="hero">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-content">
        <h1 id="hero-title"></h1>
        <p id="hero-tagline"></p>
        <a href="#services" class="btn">Explore Services</a>
      </div>
    </section>

    <section id="about">
      <div class="container">
        <h2>About Us</h2>
        <div class="about-grid">
          <div class="about-image" id="about-image"></div>
          <div class="about-text" id="about-description"></div>
        </div>
      </div>
    </section>

    <section id="services">
      <div class="container">
        <h2>Our Services</h2>
        <div class="services-grid" id="services-grid"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <h2>Get In Touch</h2>
        <div class="contact-details" id="contact-details"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p id="footer-text"></p>
      <div class="social-links" id="social-links"></div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
