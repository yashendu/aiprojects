services:
  bench-llm:
    build: .
    ports:
      - "5052:5000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./runs:/app/runs
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
