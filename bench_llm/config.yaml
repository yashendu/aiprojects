ollama:
  host: http://host.docker.internal:11434

models:
  - name: qwen3.5:4b
    label: Qwen 3.5 (4B)
    type: generation
  - name: gemma4:12b
    label: Gemma 4 (12B)
    type: generation
  - name: llama3.2:3b
    label: Llama 3.2 (3B)
    type: generation

apps:
  - name: faq_chatbot
    label: FAQ Chatbot
    url: http://host.docker.internal:5050
    models: [qwen3.5:4b]
    description: "RAG chatbot answering questions from an HR policy document."
    metric_weights:
      response_speed: 1.0
      hallucination: 1.5
      bias: 0.5
      factual_accuracy: 2.0
      context_adherence: 2.0

benchmark:
  test_questions_per_metric: 3
  judge_model: gemma4:12b
  judge_temperature: 0.0
  runs_dir: /app/runs
